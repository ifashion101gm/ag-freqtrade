name: CI – Lint & Validate

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: |
          pip install --upgrade pip
          pip install flake8 black isort

      - name: Run Black (code formatting check)
        run: black --check .

      - name: Run isort (import ordering check)
        run: isort --check-only .

      - name: Run Flake8 (style & syntax)
        run: flake8 . --max-line-length=120 --exclude=venv,.venv,build,dist

  validate-docker:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml syntax
        run: docker compose config --quiet

  secret-scan:
    name: Secret Scanning Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for accidental secrets in .env files
        run: |
          if grep -rE "(ghp_|ghs_|gho_|ghu_|github_pat_)" . --include="*.env" --include="*.yml" --include="*.json" 2>/dev/null; then
            echo "❌ Potential GitHub secret found in tracked files!"
            exit 1
          fi
          echo "✅ No secrets detected."
